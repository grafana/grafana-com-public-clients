name: Generate Clients

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25
      - name: Generate Client
        uses: grafana/shared-workflows/actions/generate-openapi-clients@d84db42bd50249775496f814bd875a476849028e
        with:
          package-name: gcom
          spec-path: openapi.json
          modify-spec-script: .github/workflows/modify-spec.sh
          commit-message: "Updating generated clients after openapi change"
          commit-author: "grafana-com[bot] <141460161+grafana-com[bot]@users.noreply.github.com>"
          commit-user-name: "grafana-com[bot]"
          commit-user-email: "141460161+grafana-com[bot]@users.noreply.github.com"
        env:
          REPO_NAME: grafana-com-public-clients

