name: Generate Clients

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.5
      - name: Generate Client
        uses: grafana/shared-workflows/actions/generate-openapi-clients@e5b7989c92b55fe3ac6dd006d6de49082ba8c507
        with:
          package-name: gcom
          spec-path: openapi.json
          modify-spec-script: .github/workflows/modify-spec.sh
          commit-changes: "false"
        env:
          REPO_NAME: grafana-com-public-clients
      - name: Pin Go module version
        shell: bash
        run: |
          cd go/gcom
          go mod edit -go=1.25.5
          go mod tidy
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        if: github.event_name == 'pull_request'
        with:
          commit_message: "Updating generated clients after openapi change"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"

