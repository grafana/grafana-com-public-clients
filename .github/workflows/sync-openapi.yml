name: Sync OpenAPI spec

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-openapi:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check for OpenAPI drift
        id: drift
        run: bash .github/workflows/check-openapi-drift.sh

      - name: Ensure sync branch exists
        if: steps.drift.outputs.drift == 'true'
        run: |
          branch=sync/openapi
          if ! gh api "repos/${{ github.repository }}/git/ref/heads/${branch}" &>/dev/null; then
            gh api "repos/${{ github.repository }}/git/refs" \
              -f ref="refs/heads/${branch}" \
              -f sha="$(git rev-parse HEAD)"
          fi

      - name: Commit OpenAPI changes
        if: steps.drift.outputs.drift == 'true'
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: Update openapi.json from grafana.com API
          repo: ${{ github.repository }}
          branch: sync/openapi
          file_pattern: openapi.json

      - name: Create pull request
        if: steps.drift.outputs.drift == 'true'
        run: |
          if [ "$(gh pr list --head sync/openapi --base main --state open --json number --jq length)" -eq 0 ]; then
            gh pr create \
              --head sync/openapi \
              --base main \
              --title "Update GCOM OpenAPI spec" \
              --label automated \
              --body 'Sync `openapi.json` with the latest [GCOM OpenAPI spec](https://grafana.com/api/openapi.json).

          The `Generate Clients` workflow will regenerate the Go client on this pull request.'
          fi
